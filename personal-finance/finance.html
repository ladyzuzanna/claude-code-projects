<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Finance</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #2563EB;
  --blue-light: #DBEAFE;
  --green: #16A34A;
  --green-light: #DCFCE7;
  --red: #DC2626;
  --red-light: #FEE2E2;
  --bg: #F3F4F6;
  --card: #FFFFFF;
  --border: #E5E7EB;
  --text: #111827;
  --muted: #6B7280;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 17px;
  line-height: 1.6;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login-heading { font-size: 36px; font-weight: 700; color: var(--blue); margin-bottom: 6px; }
.login-sub { font-size: 18px; color: var(--muted); margin-bottom: 44px; }

.login-cards {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
  max-width: 900px;
}

.login-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 32px 28px;
  flex: 1;
  min-width: 260px;
  max-width: 310px;
}

.login-card h2 { font-size: 21px; font-weight: 600; margin-bottom: 10px; }
.login-card p { color: var(--muted); font-size: 15px; margin-bottom: 18px; line-height: 1.5; }

.login-add-card {
  background: var(--card);
  border: 2px dashed var(--border);
  border-radius: 14px;
  padding: 32px 28px;
  flex: 1;
  min-width: 200px;
  max-width: 240px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: border-color 0.15s;
}
.login-add-card:hover { border-color: var(--blue); }

.login-combined-row {
  margin-top: 24px;
  display: none;
  text-align: center;
}

.login-error { color: var(--red); font-size: 14px; min-height: 20px; margin-bottom: 6px; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  font-family: inherit;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary  { background: var(--blue);   color: white; width: 100%; }
.btn-success  { background: var(--green);  color: white; }
.btn-danger   { background: var(--red);    color: white; }
.btn-secondary{ background: var(--border); color: var(--text); }
.btn-outline  { background: transparent; border: 2px solid var(--border); color: var(--text); }
.btn-sm       { padding: 6px 14px; font-size: 14px; }
.btn-icon     { padding: 5px 10px; font-size: 15px; }
.btn:hover    { opacity: 0.88; }
.btn-full     { width: 100%; }

/* ── TOP BAR ── */
#app { display: none; flex-direction: column; min-height: 100vh; }

.topbar {
  background: var(--blue);
  color: white;
  height: 58px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-title { font-size: 20px; font-weight: 700; }
.topbar-user {
  font-size: 13px;
  background: rgba(255,255,255,0.18);
  padding: 3px 12px;
  border-radius: 20px;
}
.topbar-spacer { flex: 1; }
.topbar-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  padding: 6px 16px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
}
.topbar-btn:hover { background: rgba(255,255,255,0.28); }

/* ── TAB NAV ── */
.tab-nav {
  background: var(--card);
  border-bottom: 2px solid var(--border);
  display: flex;
  padding: 0 12px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 15px 18px;
  border: none;
  background: none;
  font-size: 15px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  white-space: nowrap;
  transition: color 0.15s;
  font-family: inherit;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

/* ── CONTENT ── */
.tab-content { display: none; }
.tab-content.active { display: block; }
.page { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

/* ── CARDS ── */
.card {
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 24px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  flex-wrap: wrap;
}

/* ── BIG BALANCE ── */
.balance-card {
  background: var(--card);
  border-radius: 14px;
  border: 2px solid var(--border);
  padding: 32px 24px;
  margin-bottom: 20px;
  text-align: center;
}
.balance-label { font-size: 15px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
.balance-amount { font-size: 46px; font-weight: 700; line-height: 1.1; }
.balance-amount.pos { color: var(--green); }
.balance-amount.neg { color: var(--red); }
.balance-amount.zero { color: var(--text); }
.balance-meta { font-size: 14px; color: var(--muted); margin-top: 6px; }
.balance-details {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 24px;
  flex-wrap: wrap;
}
.balance-detail { text-align: center; }
.bd-label { font-size: 13px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.bd-amount { font-size: 22px; font-weight: 600; }

/* ── MONTH NAV ── */
.month-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 20px;
}
.mnav-btn {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 8px;
  width: 40px; height: 40px;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.15s;
}
.mnav-btn:hover { border-color: var(--blue); color: var(--blue); }
.month-label { font-size: 22px; font-weight: 600; min-width: 200px; text-align: center; }

/* ── DIFF ── */
.diff { font-size: 13px; }
.diff.pos { color: var(--green); }
.diff.neg { color: var(--red); }

/* ── TABLE ── */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 16px; }
th {
  text-align: left;
  padding: 9px 12px;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #FAFAFA; }
.td-r { text-align: right; }
.td-c { text-align: center; }

/* ── AMOUNTS ── */
.amt     { font-variant-numeric: tabular-nums; }
.amt-pos { color: var(--green); font-weight: 600; }
.amt-neg { color: var(--red);   font-weight: 600; }

/* ── FORMS ── */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
.form-input, .form-select {
  width: 100%;
  padding: 10px 14px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 16px;
  font-family: inherit;
  outline: none;
  background: white;
  color: var(--text);
  transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus { border-color: var(--blue); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card);
  border-radius: 14px;
  padding: 28px;
  width: 100%;
  max-width: 490px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal h3 { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

/* ── BADGES ── */
.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
}
.badge-gray  { background: var(--border);      color: var(--muted); }
.badge-blue  { background: var(--blue-light);  color: var(--blue);  }
.badge-green { background: var(--green-light); color: var(--green); }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 36px 20px; color: var(--muted); font-size: 16px; }

/* ── SETTINGS ITEMS ── */
.si {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 13px 0;
  border-bottom: 1px solid var(--border);
}
.si:last-child { border-bottom: none; }
.income-sub-label {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
}
.si-move  { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; margin-right: 4px; }
.si-move .btn { padding: 3px 8px; font-size: 11px; line-height: 1; }
.si-move .btn:disabled { opacity: 0.2; cursor: default; }
.si-info { flex: 1; min-width: 0; }
.si-name { font-weight: 500; font-size: 16px; }
.si-sub  { font-size: 14px; color: var(--muted); }
.si-actions { display: flex; gap: 8px; flex-shrink: 0; }

/* ── NET WORTH ── */
.nw-total { font-size: 42px; font-weight: 700; color: var(--blue); text-align: center; margin: 12px 0; }
.chart-box { position: relative; height: 280px; margin-top: 12px; }

/* ── INFO NOTE ── */
.note {
  background: var(--blue-light);
  border: 1px solid #BFDBFE;
  border-radius: 8px;
  padding: 11px 15px;
  font-size: 14px;
  color: #1E40AF;
  margin-bottom: 14px;
}

/* ── CSV PRE ── */
.csv-pre {
  background: #F1F5F9;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  color: var(--muted);
  margin-top: 8px;
  overflow-x: auto;
  white-space: pre;
}

/* ── CAT CHIPS ── */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px 4px 12px;
  font-size: 15px;
}
.chip-del {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 16px;
  line-height: 1;
  padding: 0 2px;
  font-family: inherit;
}
.chip-del:hover { color: var(--red); }

/* ── INNER TABS (History sub-tabs) ── */
.inner-tabs {
  display: flex;
  border-bottom: 2px solid var(--border);
  margin-bottom: 20px;
}
.inner-tab {
  padding: 10px 18px;
  border: none;
  background: none;
  font-size: 15px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  font-family: inherit;
  transition: color 0.15s;
}
.inner-tab:hover { color: var(--text); }
.inner-tab.active { color: var(--blue); border-bottom-color: var(--blue); }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .balance-amount { font-size: 34px; }
  .balance-details { gap: 20px; }
  .form-row { grid-template-columns: 1fr; }
  .month-label { font-size: 18px; min-width: 150px; }
  .card { padding: 16px; }
  .modal { padding: 20px; }
  .page { padding: 16px 10px; }
  .bd-amount { font-size: 18px; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════ LOGIN ═══════════════════════════════════ -->
<div id="login-screen">
  <div class="login-heading">My Finance</div>
  <div class="login-sub">Your personal money tracker</div>
  <div id="login-cards" class="login-cards"></div>
  <div id="login-combined-row" class="login-combined-row">
    <button class="btn btn-outline" onclick="openCombined()">Combined View — see all accounts together</button>
  </div>
</div>

<!-- ═══════════════════════════════════ APP ═══════════════════════════════════ -->
<div id="app">
  <div class="topbar">
    <span class="topbar-title">My Finance</span>
    <span class="topbar-user" id="user-badge">—</span>
    <span class="topbar-spacer"></span>
    <button class="topbar-btn" onclick="logout()">Log out</button>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" id="tb-overview" onclick="switchTab('overview')">Monthly Overview</button>
    <button class="tab-btn"        id="tb-networth" onclick="switchTab('networth')">Net Worth</button>
    <button class="tab-btn"        id="tb-history"  onclick="switchTab('history')">History</button>
    <button class="tab-btn"        id="tb-settings" onclick="switchTab('settings')">Settings</button>
  </div>

  <div id="tab-overview" class="tab-content active"><div class="page" id="pg-overview"></div></div>
  <div id="tab-networth" class="tab-content">        <div class="page" id="pg-networth"></div></div>
  <div id="tab-history"  class="tab-content">        <div class="page" id="pg-history"></div></div>
  <div id="tab-settings" class="tab-content">        <div class="page" id="pg-settings"></div></div>
</div>

<!-- ═══════════════════════════════════ MODAL ═══════════════════════════════════ -->
<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════
// CONSTANTS & STATE
// ════════════════════════════════════════════════════════════
const DEMO_KEY     = 'mf_demo_v2';
const PROFILES_KEY = 'mf_profiles_v1';
const CURRENCIES   = ['PLN', 'EUR', 'USD', 'DKK'];
const MONTH_NAMES  = ['January','February','March','April','May','June',
                      'July','August','September','October','November','December'];

let currentUser  = null;  // 'demo' | profileId | 'combined'
let currentTab   = 'overview';
let currentMonth = ymNow();
let nwChart      = null;
let ovChart      = null;
let historyTab   = 'monthly';

// ════════════════════════════════════════════════════════════
// DATE HELPERS
// ════════════════════════════════════════════════════════════
function ymNow() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
}

function pad(n) { return String(n).padStart(2,'0'); }

function fmtMonth(ym) {
  const [y,m] = ym.split('-');
  return `${MONTH_NAMES[+m-1]} ${y}`;
}

function prevYM(ym) {
  const [y,m] = ym.split('-').map(Number);
  const d = new Date(y, m-2, 1);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
}

function nextYM(ym) {
  const [y,m] = ym.split('-').map(Number);
  const d = new Date(y, m, 1);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
}

function relYM(monthsAgo) {
  const d = new Date();
  const nd = new Date(d.getFullYear(), d.getMonth() - monthsAgo, 1);
  return `${nd.getFullYear()}-${pad(nd.getMonth()+1)}`;
}

// ════════════════════════════════════════════════════════════
// NUMBER FORMATTING
// ════════════════════════════════════════════════════════════
function fmt(n) {
  if (!isFinite(n)) n = 0;
  return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtC(n, cur) { return `${fmt(n)} ${cur}`; }

function fmtDiff(n, cur) {
  const sign = n >= 0 ? '+' : '';
  return `${sign}${fmt(n)} ${cur}`;
}

// ════════════════════════════════════════════════════════════
// CURRENCY CONVERSION
// ════════════════════════════════════════════════════════════
function toBase(amount, fromCur, data) {
  const base  = data.baseCurrency || 'PLN';
  const rates = data.exchangeRates || {};
  if (fromCur === base) return amount;
  const inPLN = (fromCur === 'PLN') ? amount : amount * (rates[fromCur] || 1);
  if (base === 'PLN') return inPLN;
  return inPLN / (rates[base] || 1);
}

// ════════════════════════════════════════════════════════════
// PROFILES
// ════════════════════════════════════════════════════════════
function profileKey(id) { return `mf_profile_v1_${id}`; }

function getProfiles() {
  const raw = localStorage.getItem(PROFILES_KEY);
  if (raw) return JSON.parse(raw);
  // Migration: if old single-user data exists, wrap it in a profile
  const oldRaw = localStorage.getItem('mf_user_v2');
  if (oldRaw) {
    const id = 'p_' + Math.random().toString(36).slice(2,8);
    const profiles = [{ id, name: 'My Account' }];
    localStorage.setItem(profileKey(id), oldRaw);
    localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles));
    return profiles;
  }
  return [];
}

function saveProfiles(profiles) {
  localStorage.setItem(PROFILES_KEY, JSON.stringify(profiles));
}

function getProfileData(id) {
  const raw = localStorage.getItem(profileKey(id));
  if (!raw) { const d = defaultData(); localStorage.setItem(profileKey(id), JSON.stringify(d)); return d; }
  try { return JSON.parse(raw); }
  catch(e) { return defaultData(); }
}

// ════════════════════════════════════════════════════════════
// DATA ACCESS
// ════════════════════════════════════════════════════════════
function storageKey() { return currentUser === 'demo' ? DEMO_KEY : profileKey(currentUser); }

function getData() {
  const raw = localStorage.getItem(storageKey());
  if (!raw) {
    const d = currentUser === 'demo' ? buildDemoData() : defaultData();
    localStorage.setItem(storageKey(), JSON.stringify(d));
    return d;
  }
  try { return JSON.parse(raw); }
  catch(e) { return currentUser === 'demo' ? buildDemoData() : defaultData(); }
}

function saveData(d) { localStorage.setItem(storageKey(), JSON.stringify(d)); }

function monthSlot(data, ym) {
  if (!data.monthlyData) data.monthlyData = {};
  if (!data.monthlyData[ym]) data.monthlyData[ym] = { income:{}, variableExpenses:[], netWorth:{} };
  const s = data.monthlyData[ym];
  if (!s.income) s.income = {};
  if (!s.variableExpenses) s.variableExpenses = [];
  if (!s.netWorth) s.netWorth = {};
  return s;
}

// ════════════════════════════════════════════════════════════
// DEFAULT EMPTY DATA
// ════════════════════════════════════════════════════════════
function defaultData() {
  return {
    accounts: [],
    incomeSources: [],
    categories: ['Food', 'Transport', 'Entertainment'],
    fixedExpenses: [],
    monthlyData: {},
    exchangeRates: { EUR: 4.25, USD: 3.95, DKK: 0.57 },
    baseCurrency: 'PLN',
    password: '123'
  };
}

function uid() {
  return (typeof crypto !== 'undefined' && crypto.randomUUID)
    ? crypto.randomUUID()
    : Math.random().toString(36).slice(2) + Date.now().toString(36);
}

// ════════════════════════════════════════════════════════════
// DEMO DATA  (uses relative months so it always looks current)
// ════════════════════════════════════════════════════════════
function buildDemoData() {
  const accounts = [
    { id: 'da1', name: 'Main Bank',       currency: 'PLN' },
    { id: 'da2', name: 'Savings Account', currency: 'PLN' },
    { id: 'da3', name: 'Work Account',    currency: 'EUR' }
  ];

  const categories = ['Food', 'Transport', 'Entertainment', 'Health', 'Clothing'];

  const fixedExpenses = [
    { id: 'df1', name: 'Rent',     category: 'Housing',       amount: 2500, currency: 'PLN' },
    { id: 'df2', name: 'Netflix',  category: 'Entertainment', amount:   45, currency: 'PLN' },
    { id: 'df3', name: 'Gym',      category: 'Health',        amount:  120, currency: 'PLN' },
    { id: 'df4', name: 'Internet', category: 'Utilities',     amount:   59, currency: 'PLN' }
  ];

  const exchangeRates = { EUR: 4.25, USD: 3.95, DKK: 0.57 };

  const makeVar = (ym, seed) => [
    { id: uid(), name: 'Groceries',   category: 'Food',          amount: 370+seed*12,  currency: 'PLN', date: `${ym}-04` },
    { id: uid(), name: 'Restaurant',  category: 'Food',          amount:  90+seed*8,   currency: 'PLN', date: `${ym}-11` },

  ];

  const incomeSources = [
    { id: 'ds1', name: 'Freelance Work', currency: 'PLN' },

  // add demo income for income sources

  });

  return { accounts, incomeSources, categories, fixedExpenses, monthlyData, exchangeRates, baseCurrency: 'PLN', password: '123' };
}

function loginDemo() {
  currentUser = 'demo';
  getData();
  currentMonth = ymNow();
  showApp();
}

function loginProfile(id) {
  const entered  = document.getElementById(`pw-${id}`).value;
  const raw      = localStorage.getItem(profileKey(id));
  const pw       = raw ? (JSON.parse(raw).password || '123') : '123';
  if (entered === pw) {
    currentUser = id;
    currentMonth = ymNow();
    showApp();
  } else {
    document.getElementById(`err-${id}`).textContent = 'Wrong password.';
    document.getElementById(`pw-${id}`).value = '';
  }
}

function openCombined() {
  currentUser  = 'combined';
  currentMonth = ymNow();
  showApp();
}

function addProfile() {
  openModal('Add Account', `
    <div class="form-group">
      <label class="form-label">Account Name</label>
      <input type="text" class="form-input" id="np-name" placeholder="e.g. My Account, Husband's Account">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-input" id="np-pw" placeholder="Choose a password">
    </div>`,
  [
    { label: 'Cancel', cls: 'btn-secondary', fn: closeModal },
    { label: 'Create', cls: 'btn-primary',   fn: () => {
      const name = document.getElementById('np-name').value.trim();
      const pw   = document.getElementById('np-pw').value;
      if (!name) { alert('Please enter a name.'); return; }
      if (!pw)   { alert('Please set a password.'); return; }
      const id = 'p_' + uid();
      const profiles = getProfiles();
      profiles.push({ id, name });
      saveProfiles(profiles);
      const d = defaultData(); d.password = pw;

function resetDemo(fromLogin) {
  const msg = fromLogin
    ? 'Reset demo to the original sample data?'
    : 'Reset all demo data back to the original sample? This cannot be undone.';
  if (!confirm(msg)) return;
  localStorage.setItem(DEMO_KEY, JSON.stringify(buildDemoData()));
  if (currentUser === 'demo') render();
  else alert('Demo data has been reset.');
}

function logout() {
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('tb-settings').style.display = '';
  currentTab = 'overview';
  renderLogin();
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';
  app.style.flexDirection = 'column';

  if (currentUser === 'demo') {
    document.getElementById('user-badge').textContent = 'Demo Account';
    document.getElementById('tb-settings').style.display = '';
  } else if (currentUser === 'combined') {
    document.getElementById('user-badge').textContent = 'Combined View';
    document.getElementById('tb-settings').style.display = 'none';
  } else {
    const p = getProfiles().find(p => p.id === currentUser);
    document.getElementById('user-badge').textContent = p ? p.name : 'My Account';
    document.getElementById('tb-settings').style.display = '';
  }
  switchTab('overview');
}

function switchTab(tab) {
  if (tab !== 'overview' && ovChart) { ovChart.destroy(); ovChart = null; }
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`tb-${tab}`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  render();
}

function render() {
  switch(currentTab) {
    case 'overview':  renderOverview();  break;
    case 'networth':  renderNetWorth();  break;
    case 'history':   renderHistory();   break;
    case 'settings':  renderSettings();  break;
  }
}

function calcMonth(data, ym) {
  const md   = monthSlot(data, ym);
  const base = data.baseCurrency || 'PLN';
  let income = 0, fixed = 0, variable = 0;
  (data.incomeSources||[]).forEach(s => {
    income += toBase(parseFloat(md.income[s.id]||0), s.currency, data);
  });
  (data.fixedExpenses||[]).forEach(f => {
    fixed += toBase(f.amount, f.currency, data);
  });
  (md.variableExpenses||[]).forEach(e => {
    variable += toBase(e.amount, e.currency, data);
  });
  return { income, fixed, variable, expenses: fixed+variable, surplus: income-fixed-variable };
}

  (data.accounts||[]).forEach(a => {
    totalNW += toBase(parseFloat(md.netWorth[a.id]||0), a.currency, data);

  const allYMs = Object.keys(data.monthlyData||{})

    })

    ${allYMs.length >= 1 ? `

function editNetWorth() {
  const data = getData();
  if (data.accounts.length === 0) { alert('Add accounts in Settings first.'); return; }
  const md = monthSlot(data, currentMonth);

  openModal('Edit Net Worth Balances', `
    <p style="color:var(--muted);font-size:15px;margin-bottom:16px;">
      Enter the current balance of each account for <strong>${fmtMonth(currentMonth)}</strong>.
    </p>
    ${data.accounts.map(a => `
      <div class="form-group">
        <label class="form-label">${esc(a.name)} (${a.currency})</label>
        <input type="number" class="form-input" id="nw-${a.id}"
          value="${md.netWorth[a.id] !== undefined ? md.netWorth[a.id] : ''}"
          placeholder="0.00" step="0.01">
      </div>`).join('')}
  `, [
    { label: 'Cancel', cls: 'btn-secondary', fn: closeModal },
    { label: 'Save',   cls: 'btn-primary',   fn: () => {
      const d = getData();
      const s = monthSlot(d, currentMonth);
      d.accounts.forEach(a => {
        const v = parseFloat(document.getElementById(`nw-${a.id}`).value);
        s.netWorth[a.id] = isNaN(v) ? 0 : v;
      });
      saveData(d);
      closeModal();
      renderNetWorth();
    }}

// HISTORY TAB
// ════════════════════════════════════════════════════════════
function renderHistory() {
  if (currentUser === 'combined') { renderCombinedHistory(); return; }
  const pg = document.getElementById('pg-history');
  pg.innerHTML = `
    <div class="inner-tabs">
      <button class="inner-tab ${historyTab==='monthly'?'active':''}" onclick="switchHistoryTab('monthly')">Monthly History</button>
      <button class="inner-tab ${historyTab==='networth'?'active':''}" onclick="switchHistoryTab('networth')">Net Worth History</button>
    </div>
    <div id="history-content"></div>`;
  renderHistoryContent();
}

function switchHistoryTab(tab) {
  historyTab = tab;
  document.querySelectorAll('.inner-tab').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase().startsWith(tab==='monthly'?'monthly':'net')));
  renderHistoryContent();
}

function renderHistoryContent() {
  const data = getData();
  const base = data.baseCurrency || 'PLN';
  const el   = document.getElementById('history-content');
  if (!el) return;

  if (historyTab === 'monthly') {
    const yms = Object.keys(data.monthlyData||{}).sort().reverse();
    if (yms.length === 0) {
      el.innerHTML = `<div class="card"><div class="empty" style="padding:48px">No history yet. Start adding income and expenses in Monthly Overview.</div></div>`;
      return;
    }
    const rows = yms.map(ym => {
      const c = calcMonth(data, ym);
      const p = data.monthlyData[prevYM(ym)] ? calcMonth(data, prevYM(ym)) : null;
      return { ym, ...c, prev: p };
    });
    el.innerHTML = `
      <div class="card">
        <div class="tbl-wrap"><table>
          <thead><tr><th>Month</th><th class="td-r">Income</th><th class="td-r">Expenses</th><th class="td-r">Surplus</th><th></th></tr></thead>
          <tbody>
            ${rows.map(r => {
              const dI = r.prev ? r.income   - r.prev.income   : null;
              const dE = r.prev ? r.expenses - r.prev.expenses : null;
              const dS = r.prev ? r.surplus  - r.prev.surplus  : null;
              return `<tr>
                <td><strong>${fmtMonth(r.ym)}</strong></td>
                <td class="td-r">
                  <div class="amt amt-pos">${fmt(r.income)}</div>
                  ${dI!==null?`<div class="diff ${dI>=0?'pos':'neg'}">${fmtDiff(dI,'')}</div>`:''}
                </td>
                <td class="td-r">
                  <div class="amt amt-neg">${fmt(r.expenses)}</div>
                  ${dE!==null?`<div class="diff ${dE<=0?'pos':'neg'}">${fmtDiff(dE,'')}</div>`:''}
                </td>
                <td class="td-r">
                  <div class="amt ${r.surplus>=0?'amt-pos':'amt-neg'}">${fmt(r.surplus)}</div>
                  ${dS!==null?`<div class="diff ${dS>=0?'pos':'neg'}">${fmtDiff(dS,'')}</div>`:''}
                </td>
                <td class="td-r"><button class="btn btn-sm btn-outline" onclick="jumpMonth('${r.ym}')">View</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table></div>
      </div>`;

  } else {
    // Net Worth History
    const nwYMs = Object.keys(data.monthlyData||{})
      .filter(ym => { const s = data.monthlyData[ym]; return s && s.netWorth && Object.keys(s.netWorth).length > 0; })
      .sort().reverse();

    if (nwYMs.length === 0) {
      el.innerHTML = `<div class="card"><div class="empty" style="padding:48px">No net worth data yet. Log balances in the Net Worth tab.</div></div>`;
      return;
    }

    const accs = data.accounts || [];
    el.innerHTML = `
      <div class="card">
        <div class="tbl-wrap"><table>
          <thead><tr>
            <th>Month</th>
            ${accs.map(a=>`<th class="td-r">${esc(a.name)}<br><span style="font-weight:400;font-size:12px">${a.currency}</span></th>`).join('')}
            <th class="td-r">Total (${base})</th>
          </tr></thead>
          <tbody>
            ${nwYMs.map(ym => {
              const s    = data.monthlyData[ym];
              const nw   = s.netWorth || {};
              const prev = data.monthlyData[prevYM(ym)];
              const prevNW = prev && prev.netWorth ? prev.netWorth : null;
              const total = accs.reduce((sum,a)=>sum+toBase(parseFloat(nw[a.id]||0),a.currency,data),0);
              const prevTotal = prevNW ? accs.reduce((sum,a)=>sum+toBase(parseFloat(prevNW[a.id]||0),a.currency,data),0) : null;
              const dt = prevTotal !== null ? total - prevTotal : null;
              return `<tr>
                <td><strong>${fmtMonth(ym)}</strong></td>
                ${accs.map(a=>`<td class="td-r amt">${fmt(parseFloat(nw[a.id]||0))}</td>`).join('')}
                <td class="td-r">
                  <div class="amt amt-pos">${fmt(total)}</div>
                  ${dt!==null?`<div class="diff ${dt>=0?'pos':'neg'}">${fmtDiff(dt,'')}</div>`:''}
                </td>
              </tr>`;
            }).join('')}
          </tbody>
        </table></div>
      </div>`;
  }
}

function jumpMonth(ym) { currentMonth = ym; switchTab('overview'); }

function saveBase() {
  const d = getData();
  d.baseCurrency = document.getElementById('sel-base').value;
  saveData(d);
}

function saveRate(c) {
  const v = parseFloat(document.getElementById(`rate-${c}`).value);
  if (!isFinite(v)) return;
  const d = getData();
  if (!d.exchangeRates) d.exchangeRates = {};
  d.exchangeRates[c] = v;
  saveData(d);
}

function changePassword() {
  const oldV = document.getElementById('pw-old').value;
  const newV = document.getElementById('pw-new').value;
  const d    = getData();
  if (oldV !== (d.password||'123')) { alert('Current password is incorrect.'); return; }
  if (!newV) { alert('New password cannot be empty.'); return; }
  d.password = newV;
  saveData(d);
  document.getElementById('pw-old').value = '';
  document.getElementById('pw-new').value = '';
  alert('Password changed.');
}

function accountModal(title, name, currency, onSave) {
  openModal(title, `
    <div class="form-group">
      <label class="form-label">Account Name</label>
      <input type="text" class="form-input" id="ac-name" value="${esc(name)}" placeholder="e.g. Main Bank">

  [
    { label: 'Cancel', cls: 'btn-secondary', fn: closeModal },
    { label: 'Save',   cls: 'btn-primary',   fn: onSave }
  ]);
}

function moveAccount(id, dir) {
  const d = getData();
  const i = d.accounts.findIndex(a => a.id === id);
  const j = i + dir;
  if (j < 0 || j >= d.accounts.length) return;
  [d.accounts[i], d.accounts[j]] = [d.accounts[j], d.accounts[i]];
  saveData(d);
  renderSettings();
}

function addAccount() {
  accountModal('Add Account', '', 'PLN', () => {
    const name = document.getElementById('ac-name').value.trim();
    const cur  = document.getElementById('ac-cur').value;
    if (!name) { alert('Please enter a name.'); return; }
    const d = getData();
    d.accounts.push({ id: uid(), name, currency: cur });
    saveData(d); closeModal(); renderSettings();
  });
}

function editAccount(id) {
  const d   = getData();
  const acc = d.accounts.find(a=>a.id===id);
  if (!acc) return;
  accountModal(`Edit Account`, acc.name, acc.currency, () => {
    const name = document.getElementById('ac-name').value.trim();
    const cur  = document.getElementById('ac-cur').value;
    if (!name) { alert('Please enter a name.'); return; }
    const d2 = getData();
    const a2 = d2.accounts.find(a=>a.id===id);
    a2.name = name; a2.currency = cur;
    saveData(d2); closeModal(); renderSettings();
  });
}

function delAccount(id) {
  if (!confirm('Delete this account? Its income and net worth records will also be removed.')) return;
  const d = getData();
  d.accounts = d.accounts.filter(a=>a.id!==id);
  Object.values(d.monthlyData||{}).forEach(s => {
    if (s.income)   delete s.income[id];
    if (s.netWorth) delete s.netWorth[id];
  });
  saveData(d); renderSettings();
}

// ════════════════════════════════════════════════════════════
// CSV EXPORT
// ════════════════════════════════════════════════════════════
function exportCSV() {
  const data = getData();
  const lines = ['month,type,name,category,amount,currency,date,account'];

  Object.entries(data.monthlyData||{}).forEach(([ym, s]) => {
    (data.accounts||[]).forEach(a => {
      const inc = s.income && s.income[a.id];
      if (inc) lines.push(`${ym},income,${cv(a.name)},,${inc},${a.currency},,${cv(a.name)}`);
      const nw = s.netWorth && s.netWorth[a.id];
      if (nw !== undefined) lines.push(`${ym},net_worth,${cv(a.name)},,${nw},${a.currency},,${cv(a.name)}`);
    });
    (s.variableExpenses||[]).forEach(e => {
      lines.push(`${ym},variable_expense,${cv(e.name)},${cv(e.category)},${e.amount},${e.currency},${e.date||''},`);
    });
  });

  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'my-finance.csv'; a.click();
  URL.revokeObjectURL(url);
}

function cv(s) { // CSV-escape value
  if (!s) return '';
  s = String(s);
  return (s.includes(',') || s.includes('"') || s.includes('\n'))
    ? `"${s.replace(/"/g,'""')}"` : s;
}

// ════════════════════════════════════════════════════════════
// CSV IMPORT
// ════════════════════════════════════════════════════════════
function importCSV(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  ev.target.value = '';
  const reader = new FileReader();
  reader.onload = e => {
    const lines   = e.target.result.split('\n').map(l=>l.trim()).filter(Boolean);
    const headers = lines[0].split(',').map(h=>h.trim().toLowerCase());
    const rows    = lines.slice(1).map(line => {
      const cols = parseCSV(line);
      const obj  = {};
      headers.forEach((h,i) => obj[h] = (cols[i]||'').trim());
      return obj;
    });

    const preview = rows.slice(0,5).map(r =>
      `<tr><td>${r.month||''}</td><td>${r.type||''}</td><td>${esc(r.name||'')}</td><td>${r.amount||''}</td><td>${r.currency||''}</td></tr>`
    ).join('');

    openModal('Import Preview', `
      <p style="margin-bottom:12px">Found <strong>${rows.length}</strong> rows. First 5:</p>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Month</th><th>Type</th><th>Name</th><th>Amount</th><th>Currency</th></tr></thead>
        <tbody>${preview}</tbody>
      </table></div>
      <p style="color:var(--muted);font-size:14px;margin-top:12px">This will ADD to existing data.</p>`,
    [
      { label: 'Cancel', cls: 'btn-secondary', fn: closeModal },
      { label: 'Import', cls: 'btn-primary',   fn: () => {
        const d = getData();
        rows.forEach(r => {
          if (!r.month) return;
          if (!d.monthlyData) d.monthlyData = {};
          const s = monthSlot(d, r.month);
          if (r.type === 'variable_expense') {
            s.variableExpenses.push({
              id: uid(), name: r.name, category: r.category||'Other',
              amount: parseFloat(r.amount)||0, currency: r.currency||'PLN', date: r.date||''
            });
          } else if (r.type === 'income') {
            const a = d.accounts.find(a=>a.name===r.account||a.name===r.name);
            if (a) s.income[a.id] = parseFloat(r.amount)||0;
          } else if (r.type === 'net_worth') {
            const a = d.accounts.find(a=>a.name===r.account||a.name===r.name);
            if (a) s.netWorth[a.id] = parseFloat(r.amount)||0;
          }
        });
        saveData(d); closeModal(); render();
        alert(`Imported ${rows.length} rows.`);
      }}
    ]);
  };
  reader.readAsText(file);
}

function parseCSV(line) {
  const res = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (line[i] === ',' && !inQ) { res.push(cur); cur = ''; }
    else cur += line[i];
  }
  res.push(cur);
  return res;
}

// MODAL SYSTEM
// ════════════════════════════════════════════════════════════
function openModal(title, body, actions) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  const actEl = document.getElementById('modal-actions');
  actEl.innerHTML = '';
  actions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = `btn ${a.cls}`;
    btn.textContent = a.label;
    btn.onclick = a.fn;
    actEl.appendChild(btn);
  });
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => {
    const inp = document.querySelector('#modal-body input:not([type=hidden]), #modal-body select');
    if (inp) inp.focus();
  }, 40);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ════════════════════════════════════════════════════════════
// COMBINED VIEW HELPERS
// ════════════════════════════════════════════════════════════
function toPLN(amount, currency, data) {
  if (currency === 'PLN') return amount;
  const rates = data.exchangeRates || {};
  return amount * (rates[currency] || 1);
}

function calcMonthInPLN(data, ym) {
  const md = (data.monthlyData || {})[ym] || {};
  const income   = md.income || {};
  let inc = 0, fixed = 0, variable = 0;
  (data.incomeSources||[]).forEach(s => {
    inc += toPLN(parseFloat(income[s.id]||0), s.currency, data);
  });
  (data.fixedExpenses||[]).forEach(f => {
    fixed += toPLN(f.amount, f.currency, data);
  });
  ((md.variableExpenses)||[]).forEach(e => {
    variable += toPLN(e.amount, e.currency, data);
  });
  return { income: inc, fixed, variable, expenses: fixed+variable, surplus: inc-fixed-variable };
}

function netWorthInPLN(data, ym) {
  const md = (data.monthlyData||{})[ym];
  if (!md || !md.netWorth) return 0;
  let total = 0;
  (data.accounts||[]).forEach(a => {
    total += toPLN(parseFloat(md.netWorth[a.id]||0), a.currency, data);
  });
  return total;
}

      <div class="balance-details">
        <div class="balance-detail">
          <div class="bd-label">Total Income</div>
          <div class="bd-amount amt-pos">${fmtC(totalIncome,'PLN')}</div>
          ${prevHasData ? `<div class="diff ${totalIncome-prevTotalIncome>=0?'pos':'neg'}">${fmtDiff(totalIncome-prevTotalIncome,'PLN')}</div>` : ''}
        </div>
        <div class="balance-detail">
          <div class="bd-label">Total Expenses</div>
          <div class="bd-amount amt-neg">${fmtC(totalExpenses,'PLN')}</div>
          ${prevHasData ? `<div class="diff ${totalExpenses-prevTotalExpenses<=0?'pos':'neg'}">${fmtDiff(totalExpenses-prevTotalExpenses,'PLN')}</div>` : ''}
        </div>
      </div>
    </div>

      <div class="card-title">By Account</div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>Account</th>
          <th class="td-r">Income</th>
          <th class="td-r">Expenses</th>

          ${rows.map(r => `<tr>
            <td><strong>${esc(r.name)}</strong></td>

            <td class="td-r amt amt-pos">${fmt(totalIncome)}</td>

function renderCombinedHistory() {
  const profiles = getProfiles();
  const allMonths = new Set();
  profiles.forEach(p => {
    Object.keys(getProfileData(p.id).monthlyData||{}).forEach(ym => allMonths.add(ym));
  });
  const sortedMs = [...allMonths].sort().reverse();

  if (sortedMs.length === 0) {
    document.getElementById('pg-history').innerHTML = `
      <div class="card"><div class="empty" style="padding:48px">No history data yet.</div></div>`;
    return;
  }

  const rows = sortedMs.map(ym => {
    const byProfile = profiles.map(p => ({ name: p.name, ...calcMonthInPLN(getProfileData(p.id), ym) }));
    const totalIncome   = byProfile.reduce((s,r)=>s+r.income,  0);
    const totalExpenses = byProfile.reduce((s,r)=>s+r.expenses, 0);
    const pm = prevYM(ym);
    const prevByProfile = profiles.map(p => calcMonthInPLN(getProfileData(p.id), pm));
    const prevIncome   = prevByProfile.reduce((s,r)=>s+r.income,  0);
    const prevExpenses = prevByProfile.reduce((s,r)=>s+r.expenses, 0);
    const hasPrev = prevIncome > 0 || prevExpenses > 0;
    return { ym, totalIncome, totalExpenses, totalSurplus: totalIncome-totalExpenses,
             prevIncome, prevExpenses, prevSurplus: prevIncome-prevExpenses, hasPrev };
  });

  document.getElementById('pg-history').innerHTML = `
    <div class="note" style="margin-bottom:16px;">Combined history — all amounts in PLN.</div>
    <div class="card">
      <div class="card-title">Combined Monthly History</div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>Month</th>
          <th class="td-r">Income</th>
          <th class="td-r">Expenses</th>
          <th class="td-r">Surplus</th>
        </tr></thead>
        <tbody>
          ${rows.map(r=>`<tr>
            <td><strong>${fmtMonth(r.ym)}</strong></td>

              <div class="amt amt-pos">${fmt(r.totalIncome)}</div>

            </td>
            <td class="td-r">
              <div class="amt amt-neg">${fmt(r.totalExpenses)}</div>
              ${r.hasPrev?`<div class="diff ${r.totalExpenses-r.prevExpenses<=0?'pos':'neg'}">${fmtDiff(r.totalExpenses-r.prevExpenses,'')}</div>`:''}
            </td>
            <td class="td-r">
              <div class="amt ${r.totalSurplus>=0?'amt-pos':'amt-neg'}">${fmt(r.totalSurplus)}</div>
              ${r.hasPrev?`<div class="diff ${r.totalSurplus-r.prevSurplus>=0?'pos':'neg'}">${fmtDiff(r.totalSurplus-r.prevSurplus,'')}</div>`:''}
            </td>
          </tr>`).join('')}
        </tbody>
      </table></div>
    </div>`;
}
