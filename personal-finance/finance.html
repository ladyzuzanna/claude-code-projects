<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Finance</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --blue: #2563EB;
  --blue-light: #DBEAFE;
  --green: #16A34A;
  --green-light: #DCFCE7;
  --red: #DC2626;
  --red-light: #FEE2E2;
  --bg: #F3F4F6;
  --card: #FFFFFF;
  --border: #E5E7EB;
  --text: #111827;
  --muted: #6B7280;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font-size: 17px;
  line-height: 1.6;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── LOGIN ── */
#login-screen {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

.login-heading { font-size: 36px; font-weight: 700; color: var(--blue); margin-bottom: 6px; }
.login-sub { font-size: 18px; color: var(--muted); margin-bottom: 44px; }

.login-cards {
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
  max-width: 740px;
}

.login-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 36px 32px;
  flex: 1;
  min-width: 290px;
  max-width: 340px;
}

.login-card h2 { font-size: 22px; font-weight: 600; margin-bottom: 10px; }
.login-card p { color: var(--muted); font-size: 15px; margin-bottom: 22px; line-height: 1.5; }

.login-error { color: var(--red); font-size: 14px; min-height: 20px; margin-bottom: 6px; }

/* ── BUTTONS ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  font-family: inherit;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary  { background: var(--blue);   color: white; width: 100%; }
.btn-success  { background: var(--green);  color: white; }
.btn-danger   { background: var(--red);    color: white; }
.btn-secondary{ background: var(--border); color: var(--text); }
.btn-outline  { background: transparent; border: 2px solid var(--border); color: var(--text); }
.btn-sm       { padding: 6px 14px; font-size: 14px; }
.btn-icon     { padding: 5px 10px; font-size: 15px; }
.btn:hover    { opacity: 0.88; }
.btn-full     { width: 100%; }

/* ── TOP BAR ── */
#app { display: none; flex-direction: column; min-height: 100vh; }

.topbar {
  background: var(--blue);
  color: white;
  height: 58px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
}
.topbar-title { font-size: 20px; font-weight: 700; }
.topbar-user {
  font-size: 13px;
  background: rgba(255,255,255,0.18);
  padding: 3px 12px;
  border-radius: 20px;
}
.topbar-spacer { flex: 1; }
.topbar-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.3);
  color: white;
  padding: 6px 16px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  font-family: inherit;
}
.topbar-btn:hover { background: rgba(255,255,255,0.28); }

/* ── TAB NAV ── */
.tab-nav {
  background: var(--card);
  border-bottom: 2px solid var(--border);
  display: flex;
  padding: 0 12px;
  overflow-x: auto;
  scrollbar-width: none;
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 15px 18px;
  border: none;
  background: none;
  font-size: 15px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  white-space: nowrap;
  transition: color 0.15s;
  font-family: inherit;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

/* ── CONTENT ── */
.tab-content { display: none; }
.tab-content.active { display: block; }
.page { max-width: 900px; margin: 0 auto; padding: 24px 16px; }

/* ── CARDS ── */
.card {
  background: var(--card);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 24px;
  margin-bottom: 16px;
}
.card-title {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  flex-wrap: wrap;
}

/* ── BIG BALANCE ── */
.balance-card {
  background: var(--card);
  border-radius: 14px;
  border: 2px solid var(--border);
  padding: 32px 24px;
  margin-bottom: 20px;
  text-align: center;
}
.balance-label { font-size: 15px; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
.balance-amount { font-size: 46px; font-weight: 700; line-height: 1.1; }
.balance-amount.pos { color: var(--green); }
.balance-amount.neg { color: var(--red); }
.balance-amount.zero { color: var(--text); }
.balance-meta { font-size: 14px; color: var(--muted); margin-top: 6px; }
.balance-details {
  display: flex;
  justify-content: center;
  gap: 40px;
  margin-top: 24px;
  flex-wrap: wrap;
}
.balance-detail { text-align: center; }
.bd-label { font-size: 13px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
.bd-amount { font-size: 22px; font-weight: 600; }

/* ── MONTH NAV ── */
.month-nav {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  margin-bottom: 20px;
}
.mnav-btn {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 8px;
  width: 40px; height: 40px;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: border-color 0.15s;
}
.mnav-btn:hover { border-color: var(--blue); color: var(--blue); }
.month-label { font-size: 22px; font-weight: 600; min-width: 200px; text-align: center; }

/* ── DIFF ── */
.diff { font-size: 13px; }
.diff.pos { color: var(--green); }
.diff.neg { color: var(--red); }

/* ── TABLE ── */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 16px; }
th {
  text-align: left;
  padding: 9px 12px;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  border-bottom: 2px solid var(--border);
  white-space: nowrap;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #FAFAFA; }
.td-r { text-align: right; }
.td-c { text-align: center; }

/* ── AMOUNTS ── */
.amt     { font-variant-numeric: tabular-nums; }
.amt-pos { color: var(--green); font-weight: 600; }
.amt-neg { color: var(--red);   font-weight: 600; }

/* ── FORMS ── */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; }
.form-input, .form-select {
  width: 100%;
  padding: 10px 14px;
  border: 2px solid var(--border);
  border-radius: 8px;
  font-size: 16px;
  font-family: inherit;
  outline: none;
  background: white;
  color: var(--text);
  transition: border-color 0.2s;
}
.form-input:focus, .form-select:focus { border-color: var(--blue); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card);
  border-radius: 14px;
  padding: 28px;
  width: 100%;
  max-width: 490px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal h3 { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }

/* ── BADGES ── */
.badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
}
.badge-gray  { background: var(--border);      color: var(--muted); }
.badge-blue  { background: var(--blue-light);  color: var(--blue);  }
.badge-green { background: var(--green-light); color: var(--green); }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 36px 20px; color: var(--muted); font-size: 16px; }

/* ── SETTINGS ITEMS ── */
.si {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 13px 0;
  border-bottom: 1px solid var(--border);
}
.si:last-child { border-bottom: none; }
.si-move  { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; margin-right: 4px; }
.si-move .btn { padding: 3px 8px; font-size: 11px; line-height: 1; }
.si-move .btn:disabled { opacity: 0.2; cursor: default; }
.si-info { flex: 1; min-width: 0; }
.si-name { font-weight: 500; font-size: 16px; }
.si-sub  { font-size: 14px; color: var(--muted); }
.si-actions { display: flex; gap: 8px; flex-shrink: 0; }

/* ── NET WORTH ── */
.nw-total { font-size: 42px; font-weight: 700; color: var(--blue); text-align: center; margin: 12px 0; }
.chart-box { position: relative; height: 280px; margin-top: 12px; }

/* ── INFO NOTE ── */
.note {
  background: var(--blue-light);
  border: 1px solid #BFDBFE;
  border-radius: 8px;
  padding: 11px 15px;
  font-size: 14px;
  color: #1E40AF;
  margin-bottom: 14px;
}

/* ── CSV PRE ── */
.csv-pre {
  background: #F1F5F9;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  color: var(--muted);
  margin-top: 8px;
  overflow-x: auto;
  white-space: pre;
}

/* ── CAT CHIPS ── */
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 10px 4px 12px;
  font-size: 15px;
}
.chip-del {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  font-size: 16px;
  line-height: 1;
  padding: 0 2px;
  font-family: inherit;
}
.chip-del:hover { color: var(--red); }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  .balance-amount { font-size: 34px; }
  .balance-details { gap: 20px; }
  .form-row { grid-template-columns: 1fr; }
  .month-label { font-size: 18px; min-width: 150px; }
  .card { padding: 16px; }
  .modal { padding: 20px; }
  .page { padding: 16px 10px; }
  .bd-amount { font-size: 18px; }
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════ LOGIN ═══════════════════════════════════ -->
<div id="login-screen">
  <div class="login-heading">My Finance</div>
  <div class="login-sub">Your personal money tracker</div>

  <div class="login-cards">
    <div class="login-card">
      <h2>Demo Account</h2>
      <p>Explore the app with realistic sample data — three accounts, three months of history. No password needed.</p>
      <button class="btn btn-primary" onclick="loginDemo()">Open Demo</button>
      <div style="margin-top:14px;text-align:center;">
        <button class="btn btn-sm btn-outline" onclick="resetDemo(false)">Reset Demo Data</button>
      </div>
    </div>

    <div class="login-card">
      <h2>My Account</h2>
      <p>Your private finance data. Protected with a password so casual visitors can't peek.</p>
      <div class="login-error" id="login-error"></div>
      <input type="password" class="form-input" id="pw-input" placeholder="Password (default: 123)"
        onkeydown="if(event.key==='Enter')loginUser()" style="margin-bottom:12px;">
      <button class="btn btn-primary" onclick="loginUser()">Open My Account</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════ APP ═══════════════════════════════════ -->
<div id="app">
  <div class="topbar">
    <span class="topbar-title">My Finance</span>
    <span class="topbar-user" id="user-badge">—</span>
    <span class="topbar-spacer"></span>
    <button class="topbar-btn" onclick="logout()">Log out</button>
  </div>

  <div class="tab-nav">
    <button class="tab-btn active" id="tb-overview" onclick="switchTab('overview')">Monthly Overview</button>
    <button class="tab-btn"        id="tb-networth" onclick="switchTab('networth')">Net Worth</button>
    <button class="tab-btn"        id="tb-history"  onclick="switchTab('history')">History</button>
    <button class="tab-btn"        id="tb-settings" onclick="switchTab('settings')">Settings</button>
  </div>

  <div id="tab-overview" class="tab-content active"><div class="page" id="pg-overview"></div></div>
  <div id="tab-networth" class="tab-content">        <div class="page" id="pg-networth"></div></div>
  <div id="tab-history"  class="tab-content">        <div class="page" id="pg-history"></div></div>
  <div id="tab-settings" class="tab-content">        <div class="page" id="pg-settings"></div></div>
</div>

<!-- ═══════════════════════════════════ MODAL ═══════════════════════════════════ -->
<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal" id="modal">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════
// CONSTANTS & STATE
// ════════════════════════════════════════════════════════════
const DEMO_KEY  = 'mf_demo_v2';
const USER_KEY  = 'mf_user_v2';
const CURRENCIES = ['PLN', 'EUR', 'USD', 'DKK'];
const MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];

let currentUser  = null;  // 'demo' | 'user'
let currentTab   = 'overview';
let currentMonth = ymNow();
let nwChart      = null;

// ════════════════════════════════════════════════════════════
// DATE HELPERS
// ════════════════════════════════════════════════════════════
function ymNow() {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
}

function pad(n) { return String(n).padStart(2,'0'); }

function fmtMonth(ym) {
  const [y,m] = ym.split('-');
  return `${MONTH_NAMES[+m-1]} ${y}`;
}

function prevYM(ym) {
  const [y,m] = ym.split('-').map(Number);
  const d = new Date(y, m-2, 1);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
}

function nextYM(ym) {
  const [y,m] = ym.split('-').map(Number);
  const d = new Date(y, m, 1);
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}`;
}

function relYM(monthsAgo) {
  const d = new Date();
  const nd = new Date(d.getFullYear(), d.getMonth() - monthsAgo, 1);
  return `${nd.getFullYear()}-${pad(nd.getMonth()+1)}`;
}

// ════════════════════════════════════════════════════════════
// NUMBER FORMATTING
// ════════════════════════════════════════════════════════════
function fmt(n) {
  if (!isFinite(n)) n = 0;
  return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtC(n, cur) { return `${fmt(n)} ${cur}`; }

function fmtDiff(n, cur) {
  const sign = n >= 0 ? '+' : '';
  return `${sign}${fmt(n)} ${cur}`;
}

// ════════════════════════════════════════════════════════════
// CURRENCY CONVERSION
// ════════════════════════════════════════════════════════════
function toBase(amount, fromCur, data) {
  const base  = data.baseCurrency || 'PLN';
  const rates = data.exchangeRates || {};
  if (fromCur === base) return amount;
  const inPLN = (fromCur === 'PLN') ? amount : amount * (rates[fromCur] || 1);
  if (base === 'PLN') return inPLN;
  return inPLN / (rates[base] || 1);
}

// ════════════════════════════════════════════════════════════
// DATA ACCESS
// ════════════════════════════════════════════════════════════
function storageKey() { return currentUser === 'demo' ? DEMO_KEY : USER_KEY; }

function getData() {
  const raw = localStorage.getItem(storageKey());
  if (!raw) {
    const d = currentUser === 'demo' ? buildDemoData() : defaultData();
    localStorage.setItem(storageKey(), JSON.stringify(d));
    return d;
  }
  try { return JSON.parse(raw); }
  catch(e) { return currentUser === 'demo' ? buildDemoData() : defaultData(); }
}

function saveData(d) { localStorage.setItem(storageKey(), JSON.stringify(d)); }

function monthSlot(data, ym) {
  if (!data.monthlyData) data.monthlyData = {};
  if (!data.monthlyData[ym]) data.monthlyData[ym] = { income:{}, variableExpenses:[], netWorth:{} };
  const s = data.monthlyData[ym];
  if (!s.income) s.income = {};
  if (!s.variableExpenses) s.variableExpenses = [];
  if (!s.netWorth) s.netWorth = {};
  return s;
}

// ════════════════════════════════════════════════════════════
// DEFAULT EMPTY DATA
// ════════════════════════════════════════════════════════════
function defaultData() {
  return {
    accounts: [],
    categories: ['Food', 'Transport', 'Entertainment'],
    fixedExpenses: [],
    monthlyData: {},
    exchangeRates: { EUR: 4.25, USD: 3.95, DKK: 0.57 },
    baseCurrency: 'PLN',
    password: '123'
  };
}

function uid() {
  return (typeof crypto !== 'undefined' && crypto.randomUUID)
    ? crypto.randomUUID()
    : Math.random().toString(36).slice(2) + Date.now().toString(36);
}

// ════════════════════════════════════════════════════════════
// DEMO DATA  (uses relative months so it always looks current)
// ════════════════════════════════════════════════════════════
function buildDemoData() {
  const accounts = [
    { id: 'da1', name: 'Main Bank',       currency: 'PLN' },
    { id: 'da2', name: 'Savings Account', currency: 'PLN' },
    { id: 'da3', name: 'Work Account',    currency: 'EUR' }
  ];

  const categories = ['Food', 'Transport', 'Entertainment', 'Health', 'Clothing'];

  const fixedExpenses = [
    { id: 'df1', name: 'Rent',     category: 'Housing',       amount: 2500, currency: 'PLN' },
    { id: 'df2', name: 'Netflix',  category: 'Entertainment', amount:   45, currency: 'PLN' },
    { id: 'df3', name: 'Gym',      category: 'Health',        amount:  120, currency: 'PLN' },
    { id: 'df4', name: 'Internet', category: 'Utilities',     amount:   59, currency: 'PLN' }
  ];

  const exchangeRates = { EUR: 4.25, USD: 3.95, DKK: 0.57 };

  const makeVar = (ym, seed) => [
    { id: uid(), name: 'Groceries',   category: 'Food',          amount: 370+seed*12,  currency: 'PLN', date: `${ym}-04` },
    { id: uid(), name: 'Restaurant',  category: 'Food',          amount:  90+seed*8,   currency: 'PLN', date: `${ym}-11` },
    { id: uid(), name: 'Bus pass',    category: 'Transport',     amount: 110,          currency: 'PLN', date: `${ym}-01` },
    { id: uid(), name: 'Cinema',      category: 'Entertainment', amount:  38+seed*4,   currency: 'PLN', date: `${ym}-18` },
    { id: uid(), name: 'Pharmacy',    category: 'Health',        amount:  55+seed*6,   currency: 'PLN', date: `${ym}-14` }
  ];

  const m0 = relYM(0), m1 = relYM(1), m2 = relYM(2), m3 = relYM(3);

  const monthlyData = {
    [m3]: {
      income:           { da1: 8200, da2: 1000, da3: 480 },
      variableExpenses: makeVar(m3, 1),
      netWorth:         { da1: 10500, da2: 22000, da3: 3000 }
    },
    [m2]: {
      income:           { da1: 8500, da2: 1000, da3: 520 },
      variableExpenses: makeVar(m2, 2),
      netWorth:         { da1: 12800, da2: 23500, da3: 3300 }
    },
    [m1]: {
      income:           { da1: 8500, da2: 1500, da3: 550 },
      variableExpenses: makeVar(m1, 3),
      netWorth:         { da1: 14600, da2: 25000, da3: 3600 }
    },
    [m0]: {
      income:           { da1: 9000, da2: 1500, da3: 600 },
      variableExpenses: makeVar(m0, 2),
      netWorth:         { da1: 16200, da2: 26500, da3: 3900 }
    }
  };

  return { accounts, categories, fixedExpenses, monthlyData, exchangeRates, baseCurrency: 'PLN', password: '123' };
}

// ════════════════════════════════════════════════════════════
// LOGIN / LOGOUT
// ════════════════════════════════════════════════════════════
function loginDemo() {
  currentUser = 'demo';
  getData(); // init if needed
  currentMonth = ymNow();
  showApp();
}

function loginUser() {
  const entered = document.getElementById('pw-input').value;
  const raw = localStorage.getItem(USER_KEY);
  const pw = raw ? (JSON.parse(raw).password || '123') : '123';
  if (entered === pw) {
    currentUser = 'user';
    currentMonth = ymNow();
    showApp();
  } else {
    document.getElementById('login-error').textContent = 'Wrong password. Default is "123".';
    document.getElementById('pw-input').value = '';
  }
}

function resetDemo(fromLogin) {
  const msg = fromLogin
    ? 'Reset demo to the original sample data?'
    : 'Reset all demo data back to the original sample? This cannot be undone.';
  if (!confirm(msg)) return;
  localStorage.setItem(DEMO_KEY, JSON.stringify(buildDemoData()));
  if (currentUser === 'demo') render();
  else alert('Demo data has been reset.');
}

function logout() {
  currentUser = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
  document.getElementById('login-error').textContent = '';
  currentTab = 'overview';
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';
  app.style.flexDirection = 'column';
  document.getElementById('user-badge').textContent =
    currentUser === 'demo' ? 'Demo Account' : 'My Account';
  switchTab('overview');
}

// TAB MANAGEMENT
// ════════════════════════════════════════════════════════════
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById(`tb-${tab}`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  render();
}

function render() {
  switch(currentTab) {
    case 'overview':  renderOverview();  break;
    case 'networth':  renderNetWorth();  break;
    case 'history':   renderHistory();   break;
    case 'settings':  renderSettings();  break;
  }
}

function calcMonth(data, ym) {
  const md   = monthSlot(data, ym);
  const base = data.baseCurrency || 'PLN';
  let income = 0, fixed = 0, variable = 0;
  (data.accounts||[]).forEach(a => {
    income += toBase(parseFloat(md.income[a.id]||0), a.currency, data);
  });
  (data.fixedExpenses||[]).forEach(f => {
    fixed += toBase(f.amount, f.currency, data);
  });
  (md.variableExpenses||[]).forEach(e => {
    variable += toBase(e.amount, e.currency, data);
  });
  return { income, fixed, variable, expenses: fixed+variable, surplus: income-fixed-variable };
}

// NET WORTH TAB
// ════════════════════════════════════════════════════════════
function renderNetWorth() {
  const data  = getData();
  const base  = data.baseCurrency || 'PLN';
  const md    = monthSlot(data, currentMonth);

  let totalNW = 0;
  (data.accounts||[]).forEach(a => {
    totalNW += toBase(parseFloat(md.netWorth[a.id]||0), a.currency, data);
  });

  const allYMs = Object.keys(data.monthlyData||{})
    .filter(ym => {
      const s = data.monthlyData[ym];
      return s && s.netWorth && Object.keys(s.netWorth).length > 0;
    })
    .sort();

  const chartLabels = allYMs.map(ym => {
    const [y,m] = ym.split('-');
    return `${MONTH_NAMES[+m-1].slice(0,3)} ${y}`;
  });
  const chartVals = allYMs.map(ym => {
    let t = 0;
    const s = data.monthlyData[ym];
    (data.accounts||[]).forEach(a => {
      t += toBase(parseFloat(s.netWorth[a.id]||0), a.currency, data);
    });
    return +t.toFixed(2);
  });

  const pg = document.getElementById('pg-networth');
  pg.innerHTML = `
    <div class="month-nav">
      <button class="mnav-btn" onclick="goNW(-1)">&#8592;</button>
      <div class="month-label">${fmtMonth(currentMonth)}</div>
      <button class="mnav-btn" onclick="goNW(1)">&#8594;</button>
    </div>

    <div class="card" style="text-align:center;padding-bottom:28px;">
      <div class="balance-label">Net Worth — ${fmtMonth(currentMonth)}</div>
      <div class="nw-total">${fmtC(totalNW, base)}</div>
    </div>

    <div class="card">
      <div class="card-title">
        Account Balances
        <button class="btn btn-success btn-sm" onclick="editNetWorth()">Edit Balances</button>
      </div>
      ${data.accounts.length === 0
        ? `<div class="empty">No accounts yet — add them in Settings.</div>`
        : `<div class="tbl-wrap"><table>
            <thead><tr><th>Account</th><th>Currency</th><th class="td-r">Balance</th><th class="td-r">In ${base}</th></tr></thead>
            <tbody>
              ${data.accounts.map(a => {
                const bal = parseFloat(md.netWorth[a.id]||0);
                const inB = toBase(bal, a.currency, data);
                return `<tr>
                  <td><strong>${esc(a.name)}</strong></td>
                  <td><span class="badge badge-gray">${a.currency}</span></td>
                  <td class="td-r amt">${fmt(bal)}</td>
                  <td class="td-r amt amt-pos">${a.currency===base?'—':fmt(inB)}</td>
                </tr>`;
              }).join('')}
            </tbody>
          </table></div>`
      }
    </div>

    ${allYMs.length > 1 ? `
      <div class="card">
        <div class="card-title">Net Worth Over Time</div>
        <div class="chart-box"><canvas id="nw-canvas"></canvas></div>
      </div>` : ''}
  `;

  if (allYMs.length > 1) {
    const ctx = document.getElementById('nw-canvas');
    if (nwChart) { nwChart.destroy(); nwChart = null; }
    nwChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: chartLabels,
        datasets: [{
          label: `Net Worth (${base})`,
          data: chartVals,
          borderColor: '#2563EB',
          backgroundColor: 'rgba(37,99,235,0.07)',
          borderWidth: 2.5,
          pointRadius: 5,
          pointBackgroundColor: '#2563EB',
          fill: true,
          tension: 0.3
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: c => `${fmt(c.parsed.y)} ${base}` } }
        },
        scales: {
          y: {
            ticks: { callback: v => `${fmt(v)}`, font: { size: 12 } },
            grid:  { color: '#E5E7EB' }
          },
          x: {
            ticks: { font: { size: 12 } },
            grid:  { display: false }
          }
        }
      }
    });
  }
}

function editNetWorth() {
  const data = getData();
  if (data.accounts.length === 0) { alert('Add accounts in Settings first.'); return; }
  const md = monthSlot(data, currentMonth);

  openModal('Edit Net Worth Balances', `
    <p style="color:var(--muted);font-size:15px;margin-bottom:16px;">
      Enter the current balance of each account for <strong>${fmtMonth(currentMonth)}</strong>.
    </p>
    ${data.accounts.map(a => `
      <div class="form-group">
        <label class="form-label">${esc(a.name)} (${a.currency})</label>
        <input type="number" class="form-input" id="nw-${a.id}"
          value="${md.netWorth[a.id] !== undefined ? md.netWorth[a.id] : ''}"
          placeholder="0.00" step="0.01">
      </div>`).join('')}
  `, [
    { label: 'Cancel', cls: 'btn-secondary', fn: closeModal },
    { label: 'Save',   cls: 'btn-primary',   fn: () => {
      const d = getData();
      const s = monthSlot(d, currentMonth);
      d.accounts.forEach(a => {
        const v = parseFloat(document.getElementById(`nw-${a.id}`).value);
        s.netWorth[a.id] = isNaN(v) ? 0 : v;
      });
      saveData(d);
      closeModal();
      renderNetWorth();
    }}
  ]);
}

function renderHistory() {
  const data = getData();
  const base = data.baseCurrency || 'PLN';
  const yms  = Object.keys(data.monthlyData||{}).sort().reverse();

  const pg = document.getElementById('pg-history');

  if (yms.length === 0) {
    pg.innerHTML = `<div class="card"><div class="empty" style="padding:48px">
      No history yet. Start adding income and expenses in Monthly Overview.
    </div></div>`;
    return;
  }

  const rows = yms.map(ym => {
    const c = calcMonth(data, ym);
    const pym = prevYM(ym);
    const hasPrev = data.monthlyData && data.monthlyData[pym];
    const p = hasPrev ? calcMonth(data, pym) : null;
    return { ym, ...c, prev: p };
  });

  pg.innerHTML = `
    <div class="card">
      <div class="card-title">Monthly History</div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>Month</th>
          <th class="td-r">Income</th>
          <th class="td-r">Expenses</th>
          <th class="td-r">Surplus</th>
          <th></th>
        </tr></thead>
        <tbody>
          ${rows.map(r => {
            const dI = r.prev ? r.income   - r.prev.income   : null;
            const dE = r.prev ? r.expenses - r.prev.expenses : null;
            const dS = r.prev ? r.surplus  - r.prev.surplus  : null;
            return `<tr>
              <td><strong>${fmtMonth(r.ym)}</strong></td>
              <td class="td-r">
                <div class="amt amt-pos">${fmt(r.income)}</div>
                ${dI!==null ? `<div class="diff ${dI>=0?'pos':'neg'}">${fmtDiff(dI,'')}</div>` : ''}
              </td>
              <td class="td-r">
                <div class="amt amt-neg">${fmt(r.expenses)}</div>
                ${dE!==null ? `<div class="diff ${dE<=0?'pos':'neg'}">${fmtDiff(dE,'')}</div>` : ''}
              </td>
              <td class="td-r">
                <div class="amt ${r.surplus>=0?'amt-pos':'amt-neg'}">${fmt(r.surplus)}</div>
                ${dS!==null ? `<div class="diff ${dS>=0?'pos':'neg'}">${fmtDiff(dS,'')}</div>` : ''}
              </td>
              <td class="td-r">
                <button class="btn btn-sm btn-outline" onclick="jumpMonth('${r.ym}')">View</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table></div>
    </div>`;
}

function jumpMonth(ym) { currentMonth = ym; switchTab('overview'); }

function saveBase() {
  const d = getData();
  d.baseCurrency = document.getElementById('sel-base').value;
  saveData(d);
}

function saveRate(c) {
  const v = parseFloat(document.getElementById(`rate-${c}`).value);
  if (!isFinite(v)) return;
  const d = getData();
  if (!d.exchangeRates) d.exchangeRates = {};
  d.exchangeRates[c] = v;
  saveData(d);
}

function changePassword() {
  const oldV = document.getElementById('pw-old').value;
  const newV = document.getElementById('pw-new').value;
  const d    = getData();
  if (oldV !== (d.password||'123')) { alert('Current password is incorrect.'); return; }
  if (!newV) { alert('New password cannot be empty.'); return; }
  d.password = newV;
  saveData(d);
  document.getElementById('pw-old').value = '';
  document.getElementById('pw-new').value = '';
  alert('Password changed.');
}

function moveAccount(id, dir) {
  const d = getData();
  const i = d.accounts.findIndex(a => a.id === id);
  const j = i + dir;
  if (j < 0 || j >= d.accounts.length) return;
  [d.accounts[i], d.accounts[j]] = [d.accounts[j], d.accounts[i]];
  saveData(d);
  renderSettings();
}

function addAccount() {
  accountModal('Add Account', '', 'PLN', () => {
    const name = document.getElementById('ac-name').value.trim();
    const cur  = document.getElementById('ac-cur').value;
    if (!name) { alert('Please enter a name.'); return; }
    const d = getData();
    d.accounts.push({ id: uid(), name, currency: cur });
    saveData(d); closeModal(); renderSettings();
  });
}

function editAccount(id) {
  const d   = getData();
  const acc = d.accounts.find(a=>a.id===id);
  if (!acc) return;
  accountModal(`Edit Account`, acc.name, acc.currency, () => {
    const name = document.getElementById('ac-name').value.trim();
    const cur  = document.getElementById('ac-cur').value;
    if (!name) { alert('Please enter a name.'); return; }
    const d2 = getData();
    const a2 = d2.accounts.find(a=>a.id===id);
    a2.name = name; a2.currency = cur;
    saveData(d2); closeModal(); renderSettings();
  });

function delAccount(id) {
  if (!confirm('Delete this account? Its income and net worth records will also be removed.')) return;
  const d = getData();
  d.accounts = d.accounts.filter(a=>a.id!==id);
  Object.values(d.monthlyData||{}).forEach(s => {
    if (s.income)   delete s.income[id];
    if (s.netWorth) delete s.netWorth[id];
  });
  saveData(d); renderSettings();
}

// ════════════════════════════════════════════════════════════
// CSV EXPORT
// ════════════════════════════════════════════════════════════
function exportCSV() {
  const data = getData();
  const lines = ['month,type,name,category,amount,currency,date,account'];

  Object.entries(data.monthlyData||{}).forEach(([ym, s]) => {
    (data.accounts||[]).forEach(a => {
      const inc = s.income && s.income[a.id];
      if (inc) lines.push(`${ym},income,${cv(a.name)},,${inc},${a.currency},,${cv(a.name)}`);
      const nw = s.netWorth && s.netWorth[a.id];
      if (nw !== undefined) lines.push(`${ym},net_worth,${cv(a.name)},,${nw},${a.currency},,${cv(a.name)}`);
    });
    (s.variableExpenses||[]).forEach(e => {
      lines.push(`${ym},variable_expense,${cv(e.name)},${cv(e.category)},${e.amount},${e.currency},${e.date||''},`);
    });
  });

  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'my-finance.csv'; a.click();
  URL.revokeObjectURL(url);
}

function cv(s) { // CSV-escape value
  if (!s) return '';
  s = String(s);
  return (s.includes(',') || s.includes('"') || s.includes('\n'))
    ? `"${s.replace(/"/g,'""')}"` : s;
}

// ════════════════════════════════════════════════════════════
// CSV IMPORT
// ════════════════════════════════════════════════════════════
function importCSV(ev) {
  const file = ev.target.files[0];
  if (!file) return;
  ev.target.value = '';
  const reader = new FileReader();
  reader.onload = e => {
    const lines   = e.target.result.split('\n').map(l=>l.trim()).filter(Boolean);
    const headers = lines[0].split(',').map(h=>h.trim().toLowerCase());
    const rows    = lines.slice(1).map(line => {
      const cols = parseCSV(line);
      const obj  = {};
      headers.forEach((h,i) => obj[h] = (cols[i]||'').trim());
      return obj;
    });

    const preview = rows.slice(0,5).map(r =>
      `<tr><td>${r.month||''}</td><td>${r.type||''}</td><td>${esc(r.name||'')}</td><td>${r.amount||''}</td><td>${r.currency||''}</td></tr>`
    ).join('');

    openModal('Import Preview', `
      <p style="margin-bottom:12px">Found <strong>${rows.length}</strong> rows. First 5:</p>
      <div class="tbl-wrap"><table>
        <thead><tr><th>Month</th><th>Type</th><th>Name</th><th>Amount</th><th>Currency</th></tr></thead>
        <tbody>${preview}</tbody>
      </table></div>
      <p style="color:var(--muted);font-size:14px;margin-top:12px">This will ADD to existing data.</p>`,
    [
      { label: 'Cancel', cls: 'btn-secondary', fn: closeModal },
      { label: 'Import', cls: 'btn-primary',   fn: () => {
        const d = getData();
        rows.forEach(r => {
          if (!r.month) return;
          if (!d.monthlyData) d.monthlyData = {};
          const s = monthSlot(d, r.month);
          if (r.type === 'variable_expense') {
            s.variableExpenses.push({
              id: uid(), name: r.name, category: r.category||'Other',
              amount: parseFloat(r.amount)||0, currency: r.currency||'PLN', date: r.date||''
            });
          } else if (r.type === 'income') {
            const a = d.accounts.find(a=>a.name===r.account||a.name===r.name);
            if (a) s.income[a.id] = parseFloat(r.amount)||0;
          } else if (r.type === 'net_worth') {
            const a = d.accounts.find(a=>a.name===r.account||a.name===r.name);
            if (a) s.netWorth[a.id] = parseFloat(r.amount)||0;
          }
        });
        saveData(d); closeModal(); render();
        alert(`Imported ${rows.length} rows.`);
      }}
    ]);
  };
  reader.readAsText(file);
}

function parseCSV(line) {
  const res = []; let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') {
      if (inQ && line[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (line[i] === ',' && !inQ) { res.push(cur); cur = ''; }
    else cur += line[i];
  }
  res.push(cur);
  return res;
}

// ════════════════════════════════════════════════════════════
// MODAL SYSTEM
// ════════════════════════════════════════════════════════════
function openModal(title, body, actions) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  const actEl = document.getElementById('modal-actions');
  actEl.innerHTML = '';
  actions.forEach(a => {
    const btn = document.createElement('button');
    btn.className = `btn ${a.cls}`;
    btn.textContent = a.label;
    btn.onclick = a.fn;
    actEl.appendChild(btn);
  });
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(() => {
    const inp = document.querySelector('#modal-body input:not([type=hidden]), #modal-body select');
    if (inp) inp.focus();
  }, 40);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function overlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// ════════════════════════════════════════════════════════════
// SECURITY HELPER
// ════════════════════════════════════════════════════════════
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

document.addEventListener('keydown', e => {
